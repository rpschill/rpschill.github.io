name: Generate and deploy

on:
  push:
    branches:
      - master
    paths:
      - 'projects.json'
      - 'posts.json'
      - '_templates/**'
      - 'generate.py'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run generator
        run: python generate.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html work/index.html writing/index.html
          git diff --staged --quiet || git commit -m "chore: regenerate pages from data [skip ci]"
          git push
